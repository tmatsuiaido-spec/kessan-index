<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>add</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      line-height: 1.85;
      font-size: 16px;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 0 0 80px; }

    /* ── ヘッダー ── */
    .article-header {
      background: #1a1a2e;
      color: #fff;
      padding: 32px 28px 28px;
      margin-bottom: 0;
    }
    .article-header .company-name {
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .article-header .period-label {
      font-size: 0.9rem;
      color: #aab4c8;
      letter-spacing: 0.04em;
    }
    .article-thumb {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
    }

    /* ── 3行まとめ ── */
    .article-intro {
      background: #fff;
      padding: 24px 28px 20px;
      margin-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
    }
    .intro-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #999;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .intro-list { list-style: none; padding: 0; margin: 0; }
    .intro-list li {
      padding: 10px 14px;
      margin-bottom: 8px;
      background: #f8f9fb;
      border-left: 4px solid #546e7a;
      border-radius: 4px;
      color: #222;
      font-size: 0.95rem;
      line-height: 1.75;
    }
    .intro-list li:last-child { margin-bottom: 0; }

    /* ── セクション ── */
    .section {
      background: #fff;
      margin-bottom: 12px;
      padding: 28px 28px 24px;
    }
    .section-image {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    }
    .section-heading {
      font-size: 1.1rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 18px;
      padding: 10px 14px;
      border-left: 5px solid #546e7a;
      background: #f8f9fb;
      border-radius: 0 4px 4px 0;
    }
    .section p { margin-bottom: 14px; color: #333; line-height: 1.85; }
    .section p:last-child { margin-bottom: 0; }

    /* ── KPIリスト ── */
    .kpi-list {
      background: #f8f9fb;
      border: 1px solid #e8eaed;
      border-radius: 6px;
      padding: 14px 18px;
      margin: 14px 0;
    }
    .kpi-list li {
      list-style: none;
      padding: 7px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.96rem;
      color: #222;
    }
    .kpi-list li:last-child { border-bottom: none; }

    /* ── 小見出し ── */
    .sub-heading {
      font-size: 0.92rem;
      font-weight: 700;
      color: #555;
      margin: 22px 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px dashed #ccc;
    }

    /* ── 注釈 ── */
    .note {
      font-size: 0.82rem;
      color: #888;
      background: #fafafa;
      border-left: 3px solid #ccc;
      padding: 6px 12px;
      margin: 10px 0;
      border-radius: 2px;
    }

    /* ── 指標テーブル ── */
    .metrics-table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 0.94rem; }
    .metrics-table th { background: #37474f; color: #fff; padding: 8px 14px; text-align: left; }
    .metrics-table td { padding: 8px 14px; border-bottom: 1px solid #eee; background: #fff; }
    .metrics-table tr:last-child td { border-bottom: none; }

    /* ── まとめボックス ── */
    .summary-box {
      background: #fff;
      color: #1a1a1a;
      border-radius: 6px;
      padding: 24px 28px;
      text-align: center;
      margin-top: 20px;
      border: 1px solid #e0e0e0;
    }
    .summary-box .catchcopy {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      display: inline-block;
      border-bottom: 2px solid #546e7a;
      padding-bottom: 4px;
    }

    strong { color: #b22222; }
</style>
</head>
<body>
<div class="container">

  <div class="article-header">
    <p class="company-name">add</p>
    <p class="period-label"></p>
  </div>
  

  <div class="article-intro">
    <p class="intro-label">⚡ 3行でわかる今回の決算</p><ul class="intro-list"><li>ノートブックを作成。</li><li>share。</li><li>共有。</li></ul>
  </div>


</div>
<script src="../affiliate-banner.js"></script>
</body>
</html>
