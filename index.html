<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>決算動画インデックス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #10b981;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --today: #0d2a1a;
    --today-border: #10b981;
    --font-body: 'Noto Sans JP', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  header { margin-bottom: 32px; }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  h1 span {
    background: linear-gradient(90deg, #3b82f6, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* ── セクションタブ（YouTube / ブログ） ── */
  .section-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .section-btn {
    font-size: 13px;
    font-weight: 500;
    padding: 7px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
    font-family: var(--font-body);
    letter-spacing: .02em;
  }

  .section-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(16,185,129,.08);
  }

  .section-btn:hover:not(.active) {
    border-color: #2d3f58;
    color: var(--text);
  }

  /* ── フラグタブ（日本株 / 米国株） ── */
  .flag-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .flag-btn {
    font-size: 14px;
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all .2s;
    font-family: var(--font-body);
  }

  .flag-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(59,130,246,.08);
  }

  .flag-btn:hover:not(.active) {
    border-color: #2d3f58;
    color: var(--text);
  }

  /* ── 検索バー ── */
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .search-input-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 15px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 11px 14px 11px 40px;
    outline: none;
    transition: border-color .2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,.12);
  }

  input[type="text"]::placeholder { color: var(--text-muted); }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 11px 16px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(59,130,246,.08);
  }

  /* ── 件数・ソート ── */
  .meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .count b { color: var(--accent); }

  .sort-row { display: flex; gap: 6px; }

  .sort-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 5px 10px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .sort-btn:hover { color: var(--text); border-color: #2d3f58; }
  .sort-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(59,130,246,.06); }
  .sort-btn .arrow { font-size: 9px; }

  /* ── テーブル ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr { background: var(--surface2); }

  th {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .08em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 13px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  th:hover { color: var(--text-dim); }
  th.sorted { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid rgba(30,45,69,.6);
    transition: background .15s;
    animation: fadeIn .3s ease both;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(59,130,246,.04); }

  tbody tr.today-row {
    background: var(--today);
    border-left: 2px solid var(--today-border);
  }

  tbody tr.today-row:hover { background: rgba(16,185,129,.07); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  td {
    padding: 13px 16px;
    font-size: 13px;
    vertical-align: middle;
  }

  .td-date {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .today-badge {
    display: inline-block;
    background: var(--today-border);
    color: #fff;
    font-size: 9px;
    font-family: var(--font-mono);
    letter-spacing: .05em;
    padding: 2px 6px;
    border-radius: 4px;
    margin-top: 4px;
    vertical-align: middle;
  }

  .td-code {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  .td-name { font-weight: 500; color: var(--text); }

  .td-link a {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 12px;
    font-family: var(--font-mono);
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all .2s;
    white-space: nowrap;
  }

  .td-link a:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(59,130,246,.06);
  }

  .td-link a::before { content: ''; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }

  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  /* ===== FLOATING TODAY BUTTON ===== */
  .fab-today {
    position: fixed;
    bottom: 28px;
    right: 20px;
    z-index: 100;
    padding: 12px 22px;
    border-radius: 50px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    transition: all .2s;
    font-family: var(--font-mono);
    letter-spacing: .05em;
  }
  .fab-today:hover { transform: translateY(-2px); }
  .fab-today.active {
    background: var(--accent2);
    color: #fff;
    border-color: var(--accent2);
    box-shadow: 0 4px 20px rgba(16,185,129,.4);
  }

  /* スマホ: コード列を非表示 → 企業名セルに統合 */
  .col-code { /* PCでは通常表示 */ }
  .name-code {
    display: none; /* PCでは非表示 */
  }

  @media (max-width: 640px) {
    /* コード列を丸ごと非表示 */
    .col-code { display: none; }

    /* 企業名の下にコードを小さく表示 */
    .name-code {
      display: block;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--accent);
      margin-top: 2px;
      opacity: 0.8;
    }

    /* 全体余白・横スクロール防止 */
    .wrapper { padding: 24px 12px 100px; overflow-x: hidden; }
    h1 { font-size: 22px; }

    /* 検索バー：入力欄を全幅に、クリアボタンを右端に */
    .search-bar { gap: 8px; }
    .search-input-wrap { min-width: 0; flex: 1; }
    .filter-btn { padding: 10px 12px; font-size: 12px; white-space: nowrap; }

    /* ソートボタン：コンパクトに */
    .sort-row { gap: 4px; }
    .sort-btn { padding: 5px 8px; font-size: 11px; }

    /* テーブル */
    td { padding: 10px 8px; font-size: 13px; }
    th { padding: 8px 8px; font-size: 11px; }

    /* 動画ボタン：▶だけに */
    .td-link a {
      padding: 6px 10px;
      font-size: 12px;
    }
    .td-link a .link-label { display: none; }

    /* 今日だけボタン */
    .fab-today { bottom: 20px; right: 16px; padding: 13px 24px; font-size: 14px; }
  }
</style>
</head>

  <header>
    <p class="eyebrow">Earnings Analysis · Content Index</p>
    <h1>決算分析<br><span>コンテンツインデックス</span></h1>
    <p class="subtitle">企業名・証券コードで検索できます</p>
  </header>

  <div class="section-tabs">
    <button class="section-btn active" onclick="showSection('yt')" id="btn-sec-yt">📺 YouTube</button>
    <button class="section-btn" onclick="showSection('blog')" id="btn-sec-blog">📝 ブログ</button>
  </div>

  <div class="flag-tabs">
    <button class="flag-btn active" onclick="showTab('jp')" id="btn-jp">🇯🇵 日本株</button>
    <button class="flag-btn" onclick="showTab('us')" id="btn-us">🇺🇸 米国株</button>
  </div>

  <div class="search-bar">
    <div class="search-input-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="企業名 or コードで検索…" oninput="renderTable()">
    </div>
    <button class="filter-btn" onclick="clearAll()">クリア</button>
  </div>

  <div class="meta-row">
    <span class="count"><b id="countNum">0</b> 件表示中</span>
    <div class="sort-row">
      <button class="sort-btn active" id="sortDate" onclick="sortBy('date')">
        日付 <span class="arrow" id="arrowDate">↓</span>
      </button>
      <button class="sort-btn" id="sortCode" onclick="sortBy('code')">
        コード <span class="arrow" id="arrowCode">↕</span>
      </button>
      <button class="sort-btn" id="sortName" onclick="sortBy('name')">
        企業名 <span class="arrow" id="arrowName">↕</span>
      </button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="jp-head">
        <tr>
          <th onclick="sortBy('date')">決算日</th>
          <th onclick="sortBy('code')" class="col-code">コード</th>
          <th onclick="sortBy('name')">企業名</th>
          <th id="th-link-jp">動画</th>
        </tr>
      </thead>
      <thead id="us-head" style="display:none">
        <tr>
          <th onclick="sortBy('date')">決算日</th>
          <th onclick="sortBy('code')" class="col-code">Ticker</th>
          <th onclick="sortBy('name')">企業名</th>
          <th id="th-link-us">動画</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <footer>投稿後に自動更新 · データは自動生成されます</footer>

  <button class="fab-today" id="todayBtn" onclick="toggleToday()">📍 今日だけ</button>

</div>

    document.getElementById('btn-sec-' + s).classList.toggle('active', s === sec);
  });
  currentSort = { key: 'date', asc: false };
  resetSortUI();
  renderTable();
}

function showTab(tab) {
  currentTab = tab;
  document.getElementById('jp-head').style.display = tab === 'jp' ? '' : 'none';
  document.getElementById('us-head').style.display = tab === 'us' ? '' : 'none';
  ['jp','us'].forEach(t => {
    document.getElementById('btn-' + t).classList.toggle('active', t === tab);
  });
  currentSort = { key: 'date', asc: false };
  resetSortUI();
  renderTable();
}

function resetSortUI() {
  ['Date','Code','Name'].forEach(k => {
    document.getElementById('sort' + k).classList.remove('active');
    document.getElementById('arrow' + k).textContent = '↕';
  });
  document.getElementById('sortDate').classList.add('active');
  document.getElementById('arrowDate').textContent = '↓';
}

function toDateObj(str) {
  const [y, m, d] = str.split(/[-\/]/);
  return new Date(y, m - 1, d);
}

function fmtDate(dateStr) {
  const p = dateStr.split('-');
  return `'${p[0].slice(2)}/${p[1]}/${p[2]}`;
}

function isToday(dateStr) {
  const d = toDateObj(dateStr);
  const t = new Date();
  return d.getFullYear() === t.getFullYear() &&
         d.getMonth()    === t.getMonth()    &&
         d.getDate()     === t.getDate();
}

function sortBy(key) {
  if (currentSort.key === key) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort = { key, asc: key !== 'date' };
  }
  ['Date','Code','Name'].forEach(k => {
    document.getElementById('sort' + k).classList.remove('active');
    document.getElementById('arrow' + k).textContent = '↕';
  });
  const map = { date: 'Date', code: 'Code', name: 'Name' };
  if (map[key]) {
    document.getElementById('sort' + map[key]).classList.add('active');
    document.getElementById('arrow' + map[key]).textContent = currentSort.asc ? '↑' : '↓';
  }
  renderTable();
}

function toggleToday() {
  showTodayOnly = !showTodayOnly;
  document.getElementById('todayBtn').classList.toggle('active', showTodayOnly);
  renderTable();
}

function clearAll() {
  document.getElementById('searchInput').value = '';
  showTodayOnly = false;
  document.getElementById('todayBtn').classList.remove('active');
  renderTable();
}

function renderTable() {
  const data = currentData();
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  let rows = data.filter(r => {
    if (showTodayOnly && !isToday(r.date)) return false;
    if (!q) return true;
    const code = (r.code || r.ticker || '').toLowerCase();
    return code.includes(q) || r.name.toLowerCase().includes(q) || r.date.includes(q);
  });

  rows.sort((a, b) => {
    const keyA = currentTab === 'us' && currentSort.key === 'code' ? 'ticker' : currentSort.key;
    let va = a[keyA], vb = b[keyA];
    if (currentSort.key === 'date') { va = toDateObj(va); vb = toDateObj(vb); }
    if (va < vb) return currentSort.asc ? -1 : 1;
    if (va > vb) return currentSort.asc ?  1 : -1;
    return 0;
  });

  // 過去→上、未来→下
  const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
  const past   = rows.filter(r => toDateObj(r.date) <= todayMidnight);
  const future = rows.filter(r => toDateObj(r.date) >  todayMidnight);
  future.sort((a, b) => toDateObj(a.date) - toDateObj(b.date));
  rows = [...past, ...future];

  const tbody = document.getElementById('tableBody');
  document.getElementById('countNum').textContent = rows.length;

  const linkLabel = currentSection === 'yt' ? '▶ <span class="link-label">動画を見る</span>' : '▶ <span class="link-label">記事を読む</span>';
  const emptyLabel = '— 準備中';
  const thLabel = currentSection === 'yt' ? '動画' : '記事';
  ['th-link-jp', 'th-link-us'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = thLabel;
  });

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4">
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>該当する銘柄が見つかりません</p>
      </div></td></tr>`;
    return;
  }

  if (currentTab === 'jp') {
    tbody.innerHTML = rows.map((r, i) => {
      const today = isToday(r.date);
      return `
      <tr class="${today ? 'today-row' : ''}" style="animation-delay:${i*30}ms">
        <td class="td-date">${fmtDate(r.date)}${today ? '<br><span class="today-badge">TODAY</span>' : ''}</td>
        <td class="td-code col-code">${r.code}</td>
        <td class="td-name">${r.name}<span class="name-code">${r.code}</span></td>
        <td class="td-link">${r.url
          ? `<a href="${r.url}" target="_blank" rel="noopener">${linkLabel}</a>`
          : `<span style="color:var(--text-muted);font-size:12px;font-family:var(--font-mono)">${emptyLabel}</span>`}
        </td>
      </tr>`;
    }).join('');
  } else {
    tbody.innerHTML = rows.map((r, i) => {
      const today = isToday(r.date);
      return `
      <tr class="${today ? 'today-row' : ''}" style="animation-delay:${i*30}ms">
        <td class="td-date">${fmtDate(r.date)}${today ? '<br><span class="today-badge">TODAY</span>' : ''}</td>
        <td class="td-code col-code">$${r.ticker}</td>
        <td class="td-name">${r.name}<span class="name-code">${r.ticker}</span></td>
        <td class="td-link">${r.url
          ? `<a href="${r.url}" target="_blank" rel="noopener">${linkLabel}</a>`
          : `<span style="color:var(--text-muted);font-size:12px;font-family:var(--font-mono)">— not uploaded</span>`}
        </td>
      </tr>`;
    }).join('');
  }
}

renderTable();
</script>
</body>
</html>
